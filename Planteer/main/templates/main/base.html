{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Planteer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" >

    <!-- flag icons: -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/6.6.6/css/flag-icons.min.css">

    <link href="{% static 'css/style.css' %}" rel="stylesheet" />
  </head>
  <body>

    <!-- Navbar -->
    <div class="container-fluid sticky-top bg-dark pt-3 pb-3">
      <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
          <a class="navbar-brand border p-2 rounded" href="/"><h2>Planteer</h2></a>

          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav gap-3 align-items-center">
              <li class="nav-item">
                <a class="nav-link" href="{% url 'plants:all_view' %}">All Plants</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="{% url 'main:contact_view' %}">Contact Us</a>
              </li>
              <li class="nav-item">
                <a class="btn btn-success" href="{% url 'plants:new_view' %}">Add Plant</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </div>

    <!-- Content -->
    <main class="container mt-4">
      {% block content %}
      {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="container border-top py-4 mt-5">
      <div class="row">
        <div class="col-md-4">
          <h5>Planteer</h5>
          <p class="text-muted">Plant Database For Plant Lovers</p>
        </div>
        <div class="col-md-4">
          <h6>Links</h6>
          <ul class="nav flex-column">
            <li><a href="/" class="nav-link p-0 text-muted">Home</a></li>
            <li><a href="{% url 'plants:all_view' %}" class="nav-link p-0 text-muted">All Plants</a></li>
            <li><a href="{% url 'main:contact_view' %}" class="nav-link p-0 text-muted">Contact Us</a></li>
          </ul>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
